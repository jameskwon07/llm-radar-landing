<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VoidOps — 혼자 만드는 AI 툴</title>
  <meta name="description" content="VoidOps는 AI 검색 최적화, 자동화 툴을 혼자 만들고 공개하는 프로젝트입니다." />

  <!-- Google Analytics -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-TH60MXE1SY"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-TH60MXE1SY');
  </script>

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: #f0f0f0;
      line-height: 1.7;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 40px;
      border-bottom: 1px solid #1e1e1e;
    }
    .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; }
    .logo span { color: #6ee7b7; }
    .nav-links { display: flex; gap: 24px; }
    .nav-links a {
      color: #888;
      text-decoration: none;
      font-size: 14px;
      transition: color 0.2s;
    }
    .nav-links a:hover { color: #f0f0f0; }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      justify-content: center;
      max-width: 720px;
      margin: 0 auto;
      padding: 80px 40px;
    }

    .eyebrow {
      font-size: 13px;
      color: #6ee7b7;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 20px;
    }

    h1 {
      font-size: clamp(32px, 5vw, 52px);
      font-weight: 700;
      letter-spacing: -1.5px;
      line-height: 1.2;
      margin-bottom: 24px;
    }

    .desc {
      font-size: 17px;
      color: #aaa;
      max-width: 480px;
      margin-bottom: 56px;
    }

    .products {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .product-card {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      padding: 24px 28px;
      text-decoration: none;
      color: inherit;
      transition: border-color 0.2s, background 0.2s;
    }
    .product-card:hover {
      border-color: #6ee7b7;
      background: #0f1f1a;
    }

    .product-info {}
    .product-name {
      font-size: 17px;
      font-weight: 600;
      margin-bottom: 4px;
    }
    .product-name span { color: #6ee7b7; }
    .product-desc { font-size: 14px; color: #888; }

    .product-badge {
      font-size: 12px;
      background: #1a2e28;
      color: #6ee7b7;
      padding: 4px 10px;
      border-radius: 20px;
      white-space: nowrap;
      flex-shrink: 0;
      margin-left: 16px;
    }

    .arrow {
      color: #444;
      font-size: 18px;
      margin-left: 12px;
      flex-shrink: 0;
    }

    footer {
      padding: 32px 40px;
      border-top: 1px solid #1e1e1e;
      text-align: center;
      font-size: 13px;
      color: #444;
    }
    footer a { color: #666; text-decoration: none; }
    footer a:hover { color: #aaa; }

    @media (max-width: 600px) {
      nav { padding: 16px 20px; }
      main { padding: 60px 20px; }
      footer { padding: 24px 20px; }
      .product-card { padding: 20px; }
    }
  </style>
</head>
<body>

  <nav>
    <div class="logo">Void<span>Ops</span></div>
    <div class="nav-links">
      <a href="mailto:contact@voidops.space">contact</a>
    </div>
  </nav>

  <main>
    <p class="eyebrow">독립 개발자의 프로젝트</p>
    <h1>AI 시대에<br>혼자 만드는 툴들</h1>
    <p class="desc">
      솔로프레너가 직접 쓰고 싶어서 만드는 AI 도구들.
      만드는 과정도 공개합니다.
    </p>

    <div class="products">
      <a class="product-card" href="/llm-radar/">
        <div class="product-info">
          <div class="product-name"><span>LLM</span> Radar</div>
          <div class="product-desc">AI 검색에서 내 제품이 보이는지 자동 모니터링</div>
        </div>
        <span class="product-badge">베타 준비 중</span>
        <span class="arrow">→</span>
      </a>
    </div>
  </main>

  <footer>
    <p>© 2026 VoidOps · <a href="mailto:contact@voidops.space">contact@voidops.space</a></p>
  </footer>

</body>
</html>
